name: PR-Agent AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && 
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/'))
    runs-on: ubuntu-latest
    name: Run PR Agent
    
    steps:
      - name: PR Agent action step
        id: pragent
        uses: qodo-ai/pr-agent@main
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: "xai/grok-4-1-fast-non-reasoning"
          CONFIG__MAX_MODEL_TOKENS: 1000000
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: 2000000
          CONFIG__VERBOSITY_LEVEL: 2
          PR_REVIEWER__EXTRA_INSTRUCTIONS: "HÃY LUÔN PHẢN HỒI BẰNG TIẾNG VIỆT. Tập trung review logic code."
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: "HÃY VIẾT MÔ TẢ BẰNG TIẾNG VIỆT."
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: "HÃY GỢI Ý CẢI THIỆN CODE BẰNG TIẾNG VIỆT."
